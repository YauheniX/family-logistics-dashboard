name: E2E Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright Smoke Suite
    runs-on: ubuntu-latest

    # ── Non-blocking ────────────────────────────────────────────────────────
    # The E2E job is intentionally set to continue-on-error so that a single
    # flaky browser interaction never blocks a PR merge.
    #
    # Path to blocking:
    #   1. Let the suite run for several sprints; track flake rate in the
    #      uploaded playwright-report artifact.
    #   2. Once flake rate < 2 % over 30 runs, remove continue-on-error.
    #   3. Add `needs: e2e` to the deploy job in deploy.yml so the smoke
    #      gate is part of the release pipeline.
    continue-on-error: true

    env:
      VITE_USE_MOCK_BACKEND: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build app in mock mode
        run: npm run build

      - name: Run E2E smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (traces / videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
