name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:
    inputs:
      function:
        description: 'Function name to deploy (leave empty to deploy all)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect changed functions
    runs-on: ubuntu-latest
    outputs:
      functions: ${{ steps.resolve.outputs.functions }}
      has_functions: ${{ steps.resolve.outputs.has_functions }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Resolve functions to deploy
        id: resolve
        run: |
          # Manual trigger with specific function
          if [ -n "${{ inputs.function }}" ]; then
            echo "functions=[\"${{ inputs.function }}\"]" >> "$GITHUB_OUTPUT"
            echo "has_functions=true" >> "$GITHUB_OUTPUT"
            echo "📌 Manual deploy: ${{ inputs.function }}"
            exit 0
          fi

          # Manual trigger without specific function → deploy all
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ALL=$(find supabase/functions -mindepth 1 -maxdepth 1 -type d \
              -exec basename {} \; | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "functions=$ALL" >> "$GITHUB_OUTPUT"
            echo "has_functions=true" >> "$GITHUB_OUTPUT"
            echo "🚀 Manual deploy all: $ALL"
            exit 0
          fi

          # Push event → detect changed function directories
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'supabase/functions/' \
            | grep -oP 'supabase/functions/\K[^/]+' \
            | sort -u \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')

          if [ "$CHANGED" = "[]" ] || [ -z "$CHANGED" ]; then
            echo "functions=[]" >> "$GITHUB_OUTPUT"
            echo "has_functions=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No function changes detected"
          else
            echo "functions=$CHANGED" >> "$GITHUB_OUTPUT"
            echo "has_functions=true" >> "$GITHUB_OUTPUT"
            echo "🔍 Changed functions: $CHANGED"
          fi

  deploy:
    name: Deploy ${{ matrix.function }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has_functions == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        function: ${{ fromJson(needs.detect-changes.outputs.functions) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "❌ Missing required secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi

          if [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "❌ Missing required secret: SUPABASE_PROJECT_ID"
            exit 1
          fi

          echo "✅ Required secrets are configured"

      - name: Deploy ${{ matrix.function }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          echo "🚀 Deploying function: ${{ matrix.function }}"
          supabase functions deploy "${{ matrix.function }}" --project-ref "$SUPABASE_PROJECT_ID"
          echo "✅ ${{ matrix.function }} deployed successfully"
